  <!-- A (with crossbar so it reads clearly as A) -->
  <path d="M37 48 L45 16 L53 48 M40 37 H50" fill="none" stroke="url(#g)" stroke-width="4.5"
        stroke-linecap="round" stroke-linejoin="round"/>
